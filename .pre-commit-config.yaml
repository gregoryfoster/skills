repos:
  - repo: local
    hooks:
      - id: structural-tests
        name: Structural Tests
        entry: bash -c 'source .venv/bin/activate && pytest tests/structural/ -v'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Integration tests disabled on pre-push — LLM non-determinism makes this
      # too flaky as a hard gate. Run manually: scripts/run-integration-tests.sh
      # Uncomment to re-enable:
      # - id: integration-tests
      #   name: Integration Tests
      #   entry: scripts/run-integration-tests.sh
      #   language: system
      #   pass_filenames: false
      #   always_run: true
      #   stages: [pre-push]
