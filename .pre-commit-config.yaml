repos:
  - repo: local
    hooks:
      - id: structural-tests
        name: Structural Tests
        entry: bash -c 'source .venv/bin/activate && pytest tests/structural/ -v'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: integration-tests
        name: Integration Tests
        entry: scripts/run-integration-tests.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
